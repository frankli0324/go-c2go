name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: go (${{ matrix.os }}-${{ matrix.arch }} ${{ matrix.go }})
    runs-on: ${{ matrix.runner }}
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            go: '1.18.x'
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            go: '1.18.x'
            runner: ubuntu-24.04-arm
          - os: macos
            arch: amd64
            go: '1.18.x'
            runner: macos-15-intel
          - os: macos
            arch: arm64
            go: '1.18.x'
            runner: macos-15
          - os: windows
            arch: amd64
            go: '1.18.x'
            runner: windows-2025
          - os: windows
            arch: arm64
            go: '1.18.x'
            runner: windows-11-arm
          - os: linux
            arch: amd64
            go: '1.23.x'
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go test -count=1 ./...
