name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: go (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: amd64
            runner: macos-15-intel
          - os: macos
            arch: arm64
            runner: macos-15
          - os: windows
            arch: amd64
            runner: windows-2025
          - os: windows
            arch: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -count=1 ./...
